<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SPMB SMPN 1 Umbulsari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SPMB SMPN 1 UMBULSARI</h1>

        <div class="card">
            <label for="nisn">NISN</label>
            <div class="row">
                <input type="text" id="nisn" maxlength="10" placeholder="Masukkan 10 digit NISN">
                <button id="btnCekNISN" class="btn primary">Cek NISN</button>
            </div>
            <div id="status"></div>
        </div>

        <div id="formCard" class="card hidden">
            <form id="form">
                <input type="hidden" id="nisnForm">

                <h3>Pilih Jalur</h3>
                <select id="jalur">
                    <option value="">-- Pilih Jalur --</option>
                    <option value="Afirmasi">Afirmasi</option>
                    <option value="Prestasi">Prestasi</option>
                    <option value="Mutasi">Mutasi</option>
                    <option value="Zonasi">Zonasi</option>
                </select>

                <div id="prestasiBox" class="hidden">
                    <label>Jenis Prestasi</label>
                    <select id="jenis_prestasi">
                        <option value="">-- Pilih --</option>
                        <option value="Akademik">Akademik</option>
                        <option value="Non Akademik">Non Akademik</option>
                    </select>
                </div>

                <h3>Identitas Siswa</h3>
                <label>Nama</label> <input id="nama">
                <label>Jenis Kelamin</label>
                <select id="jk">
                    <option value="">Pilih</option>
                    <option>Laki-laki</option>
                    <option>Perempuan</option>
                </select>
				<label>Nomor WhatsApp (Aktif)</label> 
						<input type="tel" id="no_wa" placeholder="Contoh: 08123456789" maxlength="15">
                <label>Asal Sekolah</label> <input id="asal_sekolah">
                <label>Agama</label> <select id="agama" >
						<option value="">-- Pilih Agama --</option>
						<option value="Islam">Islam</option>
						<option value="Kristen">Kristen</option>
						<option value="Katolik">Katolik</option>
						<option value="Hindu">Hindu</option>
						<option value="Buddha">Buddha</option>
						<option value="Konghucu">Konghucu</option>
						<option value="Lainnya">Lainnya</option>
					  </select>

                <h3>Data Kependudukan</h3>
                <label>No KK</label> <input id="no_kk" maxlength="16">
                <label>NIK</label> <input id="nik" maxlength="16">
                <div class="grid">
                    <div><label>RT</label><input id="rt"></div>
                    <div><label>RW</label><input id="rw"></div>
                </div>
                <label>Dusun</label> <input id="dusun">
                <label>Desa</label> <input id="desa">
                <label>Kecamatan</label> <input id="kecamatan">

                <h3>Upload Dokumen (Maks 500KB - JPG/PDF)</h3>
                <div class="upload-group">
                    <label>Kartu Keluarga</label>
						<div id="statusKK" class="status-badge status-missing">Belum diunggah</div>
						<input type="file" id="kkFile" accept="image/jpeg, image/png, application/pdf">
						<img id="kkPreview" class="preview-img hidden">
                    
                    <label>Akta Kelahiran</label> 
						<div id="statusAkta" class="status-badge status-missing">Belum diunggah</div>
						<input type="file" id="aktaFile" accept="image/jpeg, image/png, application/pdf">
						<img id="aktaPreview" class="preview-img hidden">


                    
                    <label>SKL</label> 
						<div id="statusSKL" class="status-badge status-missing">Belum diunggah</div>
						<input type="file" id="sklFile" accept="image/jpeg, image/png, application/pdf">
						<img id="sklPreview" class="preview-img hidden">
                    
                    <label>Foto 3x4</label> 
						<div id="statusFoto" class="status-badge status-missing">Belum diunggah</div> <input type="file" id="fotoFile" accept="image/jpeg, image/png">
						<img id="fotoPreview" class="preview hidden">
                </div>

                <div id="progressContainer" class="progress-container hidden">
                    <label>Proses Upload:</label>
                    <div class="progress"><div id="progressKK" class="bar"></div></div>
                    <div class="progress"><div id="progressAkta" class="bar"></div></div>
                    <div class="progress"><div id="progressSKL" class="bar"></div></div>
                    <div class="progress"><div id="progressFoto" class="bar"></div></div>
                </div>

                <div class="actions">
                    <button type="submit" id="btnSubmit" class="btn primary">Kirim Pendaftaran</button>
                    <button type="button" id="btnUpdate" class="btn warning hidden">Update Data</button>
                    <button type="button" id="btnCetakBukti" class="btn success hidden">Cetak Bukti</button>
					<button type="button" id="btnResetLainnya" class="btn success">Daftarkan Siswa Lainnya</button>
                </div>
            </form>
        </div>

        <div id="previewBukti" class="card hidden">
            <div id="formulirCetak"></div>
            <div class="actions">
                <button id="btnPrint" class="btn primary">Cetak Sekarang</button>
                <button id="btnBack" class="btn">Kembali</button>
            </div>
        </div>
    </div>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
